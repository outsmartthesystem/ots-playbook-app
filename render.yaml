# Render blueprint for ots-playbook-app. Mirrors the outsmart-app house pattern.
# NEW service, NEW database, NEW subdomain (hustle.outsmartthesystem.org, D2).
# Does not touch outsmart-app or ots-teen-agent infra.
services:
  - type: web
    name: ots-playbook-app
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ots-playbook-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: LAUNCH_MODE
        value: preview
      - key: QUESTIONS_ENABLED
        value: "0"
      - key: DIGEST_DRY
        value: "1"
      # Remaining secrets (RESEND_API_KEY, ADMIN_*, COUNSEL_SIGNOFF_*, CLASSIFIER_*,
      # STRIPE_WEBHOOK_SECRET, APP_URL, FROM_EMAIL, SAFETY_ALERT_*) are set in the Render dashboard.

  - type: cron
    name: ots-playbook-digest
    runtime: node
    schedule: "0 2 * * 1"          # Monday 02:00 UTC ~ Sunday evening America/Phoenix
    buildCommand: npm install
    startCommand: node digest.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ots-playbook-db
          property: connectionString
      - key: DIGEST_DRY
        value: "1"                  # flip to 0 in the dashboard when ready to email parents
      # RESEND_API_KEY, FROM_EMAIL, APP_URL, JWT_SECRET set in the dashboard (JWT_SECRET must match the web service).

  - type: cron
    name: ots-playbook-reminders
    runtime: node
    schedule: "0 15 * * *"         # daily 15:00 UTC ~ 8am America/Phoenix
    buildCommand: npm install
    startCommand: node reminders.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ots-playbook-db
          property: connectionString
      - key: DIGEST_DRY
        value: "1"

  - type: cron
    name: ots-playbook-admin-digest
    runtime: node
    schedule: "0 13 * * 1"         # Monday 13:00 UTC ~ 6am America/Phoenix
    buildCommand: npm install
    startCommand: node adminDigest.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ots-playbook-db
          property: connectionString
      - key: DIGEST_DRY
        value: "1"

databases:
  - name: ots-playbook-db
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
