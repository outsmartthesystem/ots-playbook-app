<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>OTS Playbook</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap">
<meta name="theme-color" content="#0f0f12">
<style>
  :root{
    --canvas:#0b0b0e;      /* body behind the shell */
    --bg:#0f0f12;          /* the app page */
    --panel:#16161b;       /* cards, surfaces, inputs */
    --panel2:#1e1e25;      /* raised: hero, code */
    --ink:#ECE7DF;         /* primary text */
    --muted:#A29C92;       /* secondary text */
    --accent:#E0A45C;      /* ember: brand, buttons, active */
    --accent-ink:#1c1206;  /* text on ember fills */
    --accent-hover:#d8994e;
    --accent2:#D97567;     /* revise / parked */
    --rule:rgba(236,231,223,.10); /* hairline borders */
    --ok:#7FB069;
    --ok-ink:#0E1B08;      /* dark text on the ok-green Verify button */
    --danger:#C4574A;      /* child-safety only: thin rails, borders, .err text */
    --danger-fill:#A83E33; /* darkened danger for SOLID marks (AA-safe w/ danger-ink) */
    --danger-ink:#FBEEEB;  /* near-white text on danger fills */
    --danger-tint:rgba(196,87,74,.12); /* danger surface wash */
    --danger-line:rgba(196,87,74,.50); /* strong danger hairline */
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'Inter',system-ui,-apple-system,'Segoe UI',Arial,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; background:var(--canvas); color:var(--ink);
    font-family:var(--sans); font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased; }
  a{ color:var(--accent); }
  #app{ max-width:680px; margin:0 auto; min-height:100vh; background:var(--bg);
    padding:16px 16px 92px; }
  .beta{ background:rgba(224,164,92,.10); color:var(--accent); text-align:center; font-size:12px;
    letter-spacing:.03em; padding:5px 8px; border-bottom:1px solid var(--rule); }
  h1{ font-family:var(--serif); font-weight:600; font-size:26px; color:var(--ink); margin:.2em 0 .4em; letter-spacing:-.01em; }
  h2{ font-family:var(--serif); font-weight:600; font-size:19px; color:var(--ink); margin:1em 0 .3em; }
  .muted{ color:var(--muted); font-size:14px; }
  .card{ border:1px solid var(--rule); border-radius:3px; padding:16px; margin:12px 0; background:var(--panel); }
  .hero{ background:var(--panel2); color:var(--ink); border:1px solid var(--rule); border-left:2.5px solid var(--accent); }
  .hero .muted{ color:var(--muted); }
  button, .btn{ display:inline-block; background:var(--accent); color:var(--accent-ink); border:0; border-radius:3px;
    padding:12px 16px; font-size:16px; font-weight:600; cursor:pointer; text-decoration:none; font-family:var(--sans); }
  button:hover, .btn:hover{ background:var(--accent-hover); }
  button.ghost, .btn.ghost{ background:transparent; color:var(--accent); border:1px solid var(--accent); }
  button.ghost:hover, .btn.ghost:hover{ background:rgba(224,164,92,.08); }
  button.wide{ width:100%; }
  input, textarea{ width:100%; padding:12px; border:1px solid var(--rule); border-radius:3px; background:var(--panel);
    color:var(--ink); font-size:16px; font-family:inherit; margin:6px 0; }
  input:focus, textarea:focus{ outline:none; border-color:var(--accent); }
  input::placeholder, textarea::placeholder{ color:var(--muted); }
  label{ font-size:13px; color:var(--muted); font-weight:600; }
  .pill{ display:inline-block; font-size:11px; padding:2px 8px; border-radius:3px; border:1px solid var(--rule); color:var(--muted); }
  .pill.done{ background:rgba(127,176,105,.12); color:var(--ok); border-color:rgba(127,176,105,.35); }
  .pill.parked{ background:rgba(217,117,103,.12); color:var(--accent2); border-color:rgba(217,117,103,.35); }
  .pill.in_progress{ background:rgba(224,164,92,.12); color:var(--accent); border-color:rgba(224,164,92,.35); }
  .station{ display:flex; justify-content:space-between; align-items:center; gap:8px;
    padding:12px; border:1px solid var(--rule); border-radius:3px; margin:8px 0; cursor:pointer; background:var(--panel); }
  .station:hover{ border-color:var(--accent); }
  pre{ background:var(--panel2); border:1px solid var(--rule); border-radius:3px; padding:12px;
    overflow:auto; font-family:Consolas,monospace; font-size:13px; white-space:pre-wrap; color:var(--ink); }
  .tabs{ position:fixed; bottom:0; left:0; right:0; display:flex; background:var(--panel);
    border-top:1px solid var(--rule); max-width:680px; margin:0 auto; }
  .tabs a{ flex:1; text-align:center; padding:10px; font-size:12px; color:var(--muted); text-decoration:none; }
  .tabs a.active{ color:var(--accent); font-weight:700; }
  .foot{ font-size:11px; color:var(--muted); text-align:center; margin:24px 0 0; }
  .err{ color:var(--danger); font-size:14px; }
  .row{ display:flex; gap:8px; align-items:center; }
  .grow{ flex:1; }
  /* ---------- admin cockpit (operator-only) accents. Appended last so single-class
     rail/badge rules win by source order over .station / .card. ---------- */
  .cockpit-eye{ font-family:var(--sans); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
  .cockpit-head{ border-bottom:1px solid var(--rule); padding-bottom:10px; margin:2px 0 12px; }
  .cockpit-n{ font-family:var(--serif); font-weight:600; font-size:32px; line-height:1; color:var(--accent); font-variant-numeric:tabular-nums; }
  .cockpit-n.clear{ color:var(--ok); }
  .cockpit-n.flag{ color:var(--danger); }
  .cockpit-l{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-top:3px; }
  .rail-review{ box-shadow:inset 3px 0 0 var(--accent); }
  .rail-ok{ box-shadow:inset 3px 0 0 var(--ok); }
  .rail-revise{ box-shadow:inset 3px 0 0 var(--accent2); }
  .rail-flag{ box-shadow:inset 4px 0 0 var(--danger); background:var(--danger-tint); }
  .badge-flag{ display:inline-block; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 8px; border-radius:3px; background:var(--danger-fill); color:var(--danger-ink); }
  .danger-banner{ border:1px solid var(--danger-line); box-shadow:inset 4px 0 0 var(--danger); background:var(--danger-tint); border-radius:3px; padding:14px; margin:12px 0; }
  .dnc-bar{ display:block; margin-top:10px; padding:9px 12px; border-radius:3px; background:var(--danger-fill); color:var(--danger-ink); font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:13px; }
  button.ok, .btn.ok{ background:var(--ok); color:var(--ok-ink); }
  button.ok:hover, .btn.ok:hover{ filter:brightness(1.06); }
  button.revise, .btn.revise{ background:transparent; color:var(--accent2); border:1px solid var(--accent2); }
  button.revise:hover, .btn.revise:hover{ background:rgba(217,117,103,.08); }
  .count-parked{ color:var(--accent2); font-weight:600; }
</style>
</head>
<body>
<div id="beta"></div>
<div id="app"></div>
<nav id="tabs"></nav>

<script>
const API = '';
let TOKEN = localStorage.getItem('ots_token') || '';
let ME = null;
const app = document.getElementById('app');

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// tiny markdown-lite: bold, paragraphs, fenced code, bullet lists. Enough for P0.
function md(t){
  if(!t) return '';
  const blocks = String(t).replace(/\r\n/g,'\n').split(/\n{2,}/);
  return blocks.map(b=>{
    if(/^```/.test(b)){ return '<pre>'+esc(b.replace(/^```.*\n?|\n?```$/g,''))+'</pre>'; }
    if(/^\s*[-*]\s+/.test(b)){
      const items=b.split('\n').filter(l=>l.trim()).map(l=>'<li>'+inline(esc(l.replace(/^\s*[-*]\s+/,'')))+'</li>').join('');
      return '<ul>'+items+'</ul>';
    }
    return '<p>'+inline(esc(b))+'</p>';
  }).join('');
}
function inline(s){ return String(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); }

async function api(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(TOKEN) headers['Authorization'] = 'Bearer '+TOKEN;
  const res = await fetch(API+path, Object.assign({}, opts, { headers }));
  let data = {}; try{ data = await res.json(); }catch(_){}
  if(!res.ok) throw new Error(data.error || ('HTTP '+res.status));
  return data;
}

function setToken(t){ TOKEN=t; if(t) localStorage.setItem('ots_token',t); else localStorage.removeItem('ots_token'); }
function logout(){ setToken(''); ME=null; location.hash='#/login'; }

// ---------- render helpers ----------
function statusPill(s){ return '<span class="pill '+s+'">'+esc(s.replace('_',' '))+'</span>'; }

async function renderBeta(){
  try{ const v = await api('/version');
    document.getElementById('beta').innerHTML = v.launch_mode==='production' ? '' :
      '<div class="beta">BETA (preview mode). Real students launch after counsel sign-off.</div>';
  }catch(_){}
}

// ---------- screens ----------
function screenLogin(){
  app.innerHTML = `<h1>OTS Playbook</h1>
    <p class="muted">Log in to build your business, one chapter at a time.</p>
    <div class="card">
      <label>Email or username</label><input id="li_id" autocomplete="username">
      <label>Password</label><input id="li_pw" type="password" autocomplete="current-password">
      <p id="li_err" class="err"></p>
      <button class="wide" onclick="doLogin()">Log in</button>
    </div>
    <p class="muted">Have a claim link from a parent or from Jay? Open it to set your password.</p>`;
  renderTabs();
}
async function doLogin(){
  const id=document.getElementById('li_id').value.trim(), pw=document.getElementById('li_pw').value;
  try{
    const idIsEmail = id.includes('@');
    const data = await api('/api/login',{method:'POST',body:JSON.stringify(idIsEmail?{email:id,password:pw}:{username:id,password:pw})});
    setToken(data.token); ME=data.user; location.hash = ME.role==='admin' ? '#/admin' : '#/';
  }catch(e){ document.getElementById('li_err').textContent=e.message; }
}

function screenClaim(token){
  app.innerHTML = `<h1>Set your password</h1>
    <p class="muted">Welcome. Pick a password (8+ characters) to start.</p>
    <div class="card">
      <label>New password</label><input id="cl_pw" type="password" autocomplete="new-password">
      <p id="cl_err" class="err"></p>
      <button class="wide" onclick="doClaim('${esc(token)}')">Start</button>
    </div>`;
  renderTabs();
}
async function doClaim(token){
  const pw=document.getElementById('cl_pw').value;
  try{ const data=await api('/api/claim',{method:'POST',body:JSON.stringify({token,password:pw})});
    setToken(data.token); ME=data.user; location.hash='#/';
  }catch(e){ document.getElementById('cl_err').textContent=e.message; }
}

async function screenHome(){
  const [next, chapters] = await Promise.all([api('/api/me/next'), api('/api/chapters')]);
  const cur = next.next;
  app.innerHTML = `
    <div class="muted">Hi ${esc(ME.first_name||'')}. ${next.done} steps done${next.parked?`, ${next.parked} parked`:''}.</div>
    ${cur ? `<div class="card hero">
        <div class="muted">You are here</div>
        <div style="font-size:15px;margin:4px 0">Chapter ${cur.number}: ${esc(cur.chapter_title)}</div>
        <h1 style="margin:.2em 0">Next move</h1>
        <div style="margin:6px 0 14px">${esc(cur.title)}</div>
        <a class="btn" href="${cur.move_type==='artifact'?('#/artifact/'+esc(cur.kind)):('#/step/'+esc(cur.stable_key))}">Do this move</a>
      </div>`
      : `<div class="card hero"><h1>You are all caught up.</h1>
         <div class="muted">Every step is done or parked. Slow and real beats fast and fake.</div></div>`}
    <h2>Your chapters</h2>
    ${chapters.chapters.filter(c=>c.number>=1).slice(0,3).map(c=>
      `<div class="station" onclick="location.hash='#/chapter/${esc(c.stable_key)}'">
        <div><strong>${c.number}. ${esc(c.title)}</strong><div class="muted">${esc(c.walk_away||'')}</div></div>
        <span class="pill">&rsaquo;</span></div>`).join('')}
    <p class="foot"><a href="#/questions">Ask Jay</a> &middot; <a href="#/checkpoints">Parent sign-offs</a> &middot; <a href="#/what-parent-sees">What your parent can see</a> &middot; <a href="#/privacy">Privacy</a></p>
    <p class="foot">Entrepreneurship coaching and education, not financial, tax, legal, or investment advice.</p>`;
  renderTabs('home');
}

async function screenPlaybook(){
  const [next, res] = await Promise.all([api('/api/me/next').catch(()=>({})), api('/api/chapters')]);
  const list = res.chapters.filter(c=>c.number>=1);
  const curNum = (next && next.next && next.next.number) || 1;
  const card = (c, active)=>`<div class="station" ${active?'style="border:2px solid var(--accent)"':''} onclick="location.hash='#/chapter/${esc(c.stable_key)}'">
      <div><strong>${c.number}. ${esc(c.title)}</strong>
        <div class="muted">${esc(c.walk_away||'')}</div></div>
      <span class="pill">&rsaquo;</span></div>`;
  const current = list.find(c=>c.number===curNum);
  const upnext = list.find(c=>c.number===curNum+1);
  const rest = list.filter(c=>c.number!==curNum && c.number!==curNum+1);
  app.innerHTML = `<h1>The playbook</h1>
    <p class="muted">One mission at a time. Finish the move at the end of each chapter before the next.</p>
    ${current?`<div class="muted" style="font-size:12px;margin-top:10px">You are here</div>${card(current,true)}`:''}
    ${upnext?`<div class="muted" style="font-size:12px;margin-top:12px">Up next</div>${card(upnext,false)}`:''}
    ${rest.length?`<details style="margin-top:14px"><summary style="cursor:pointer;color:var(--muted);padding:8px 0">The whole road map (${list.length} chapters)</summary>${rest.map(c=>card(c,false)).join('')}</details>`:''}
    <p class="foot">Read in order the first time.</p>`;
  renderTabs('playbook');
}

async function screenChapter(key){
  const { chapter, steps, checklist } = await api('/api/chapters/'+key);
  const _bs = chapter.body_sections||[];
  const _intro = _bs.filter(s=>s.heading==='intro');
  const _extras = _bs.filter(s=>s.heading!=='intro');
  app.innerHTML = `<a class="muted" href="#/playbook">&lsaquo; All chapters</a>
    <h1>${chapter.number}. ${esc(chapter.title)}</h1>
    <p class="muted"><strong>You walk away with:</strong> ${esc(chapter.walk_away||'')}</p>
    <p class="muted">${esc(chapter.rough_time||'')}</p>
    ${_intro.map(s=>`<div class="card">${md(s.md)}</div>`).join('')}
    <h2>Steps</h2>
    ${steps.map(s=>`<div class="station" onclick="location.hash='#/step/${esc(s.stable_key)}'">
      <div><strong>${esc(s.title)}</strong> <span class="muted">(${esc(s.kind)})</span></div>
      ${statusPill(s.status)}</div>`).join('')}
    ${checklist.length?`<h2>Check your work</h2><div class="card">${checklist.map(ci=>`<label style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;font-weight:400;cursor:pointer"><input type="checkbox" style="width:auto;margin-top:3px" ${ci.checked?'checked':''} onchange="toggleCheck('${esc(ci.stable_key)}',this)"><span>${esc(ci.text)}</span></label>`).join('')}</div>`:''}
    ${_extras.length?`<details style="margin-top:12px"><summary style="cursor:pointer;color:var(--muted);padding:6px 0">More on this chapter</summary>${_extras.map(s=>`<div class="card"><strong>${esc(s.heading)}</strong>${md(s.md)}</div>`).join('')}</details>`:''}`;
  renderTabs('playbook');
}

function actionsForChapter(n){
  const map={1:['interview_done'],3:['offer_shown_to_adult'],4:['offer_shown_to_adult'],5:['page_shipped'],6:['email_sent_to_list'],7:['outreach_sent','reply_received','call_booked','sale_made'],8:['post_published'],9:['post_published'],11:['consent_collected']};
  return map[n]||['outreach_sent','sale_made'];
}
async function screenStep(key){
  const { step, templates, progress } = await api('/api/steps/'+encodeURIComponent(key));
  const st = progress ? progress.status : 'not_started';
  app.innerHTML = `<a class="muted" href="#/chapter/${esc(step.chapter_key)}">&lsaquo; Chapter ${step.chapter_number}</a>
    <h1>${esc(step.title)}</h1>
    <div class="muted">Chapter ${step.chapter_number}: ${esc(step.chapter_title)} ${statusPill(st)}</div>
    <div class="card">${md(step.teach_md)}</div>
    ${step.jay_md?`<h2>How Jay did it</h2><div class="card">${md(step.jay_md)}</div>`:''}
    ${templates.map(t=>`<h2>${esc(t.title||'Copy and adapt')}</h2><pre>${esc(t.body)}</pre>`).join('')}
    ${step.now_you_md?`<h2>Your move</h2><div class="card">${md(step.now_you_md)}</div>`:''}
    ${step.kind==='action'?`<div class="card"><strong>Log what you actually did</strong>
      <div class="muted" style="margin:4px 0 8px">Real actions only. This is what Jay watches, not reading.</div>
      ${actionsForChapter(step.chapter_number).map(a=>`<button class="ghost" style="margin:4px 4px 0 0;font-size:13px" onclick="logAction('${a}','${esc(step.chapter_key)}')">${a.replace(/_/g,' ')}</button>`).join('')}
    </div>`:''}
    <div class="card">
      <label>What did you actually do? (one sentence)</label>
      <textarea id="dn" rows="2" placeholder="I ...">${esc(progress&&progress.done_note||'')}</textarea>
      <div class="row">
        <button class="grow" onclick="markDone('${esc(key)}')">Mark done</button>
        <button class="ghost" onclick="showPark('${esc(key)}')">I'm stuck</button>
      </div>
      <div id="park"></div>
      <p id="st_err" class="err"></p>
    </div>`;
  renderTabs('playbook');
}
async function toggleCheck(key, el){
  const checked = el.checked;
  try{ await api('/api/checklist/'+encodeURIComponent(key)+'/toggle',{method:'POST',body:JSON.stringify({checked})}); }
  catch(e){ el.checked = !checked; }
}
async function markDone(key){
  const note=document.getElementById('dn').value.trim();
  try{ await api('/api/steps/'+encodeURIComponent(key)+'/done',{method:'POST',body:JSON.stringify({done_note:note})});
    history.back();
  }catch(e){ document.getElementById('st_err').textContent=e.message; }
}
function showPark(key){
  document.getElementById('park').innerHTML =
    `<label>What is blocking you? (Parked is honest. Jay will see this.)</label>
     <textarea id="pr" rows="2"></textarea>
     <button class="ghost" onclick="doPark('${esc(key)}')">Park this step</button>`;
}
async function doPark(key){
  const reason=document.getElementById('pr').value.trim();
  try{ await api('/api/steps/'+encodeURIComponent(key)+'/park',{method:'POST',body:JSON.stringify({parked_reason:reason})});
    history.back();
  }catch(e){ document.getElementById('st_err').textContent=e.message; }
}

// ---------- admin ----------
async function screenAdmin(){
  const { students } = await api('/api/admin/students');
  app.innerHTML = `
    <div class="cockpit-head">
      <div class="cockpit-eye">OTS Cockpit &middot; Cohort</div>
      <div class="cockpit-n">${students.length}</div>
      <div class="cockpit-l">Students</div>
    </div>
    <p class="muted"><a href="#/review">Review queue</a> &middot; <a href="#/inbox">Question inbox</a></p>
    <div class="card">
      <label>Create a demo student (P0)</label>
      <input id="ns_first" placeholder="First name">
      <input id="ns_user" placeholder="username (optional, for username login)">
      <button onclick="createStudent()">Create + get claim link</button>
      <div id="ns_out"></div>
    </div>
    <h2>Students (${students.length})</h2>
    ${students.length? students.map(s=>`<div class="station" onclick="location.hash='#/admin/student/${s.id}'">
      <div><strong>${esc(s.first_name)} ${esc(s.last_initial||'')}</strong>
        <div class="muted">${s.steps_done} done, ${s.steps_parked?`<span class="count-parked">${s.steps_parked} parked</span>`:'0 parked'}. Last: ${s.last_activity?new Date(s.last_activity).toLocaleString():'never'}</div></div>
      <span class="pill">${esc(s.account_state)}</span></div>`).join('') : '<p class="muted">No students yet.</p>'}
    <p class="foot"><a href="#" onclick="logout();return false">Log out</a></p>`;
  renderTabs();
}
async function createStudent(){
  const first=document.getElementById('ns_first').value.trim();
  const username=document.getElementById('ns_user').value.trim();
  try{ const d=await api('/api/admin/students',{method:'POST',body:JSON.stringify({first_name:first,username})});
    document.getElementById('ns_out').innerHTML=`<p class="muted">Claim link (hand to the student):</p><pre>${esc(d.claim_url)}</pre>`;
  }catch(e){ document.getElementById('ns_out').innerHTML='<p class="err">'+esc(e.message)+'</p>'; }
}
async function screenAdminStudent(id){
  const { student, timeline } = await api('/api/admin/students/'+id);
  const railFor = s => ({done:'rail-ok',verified:'rail-ok',parked:'rail-revise',submitted:'rail-review',in_progress:'rail-review'}[s]||'');
  app.innerHTML = `<a class="muted" href="#/admin">&lsaquo; Cohort</a>
    <div class="cockpit-eye">Cockpit &middot; Student</div>
    <h1>${esc(student.first_name)} ${esc(student.last_initial||'')}</h1>
    <div class="muted">${esc(student.account_state)} &middot; <a href="#/report/${id}">Application report</a></div>
    <div class="card"><strong>Exports</strong>
      <div><a href="#" onclick="downloadAuth('/api/admin/export/students.csv','students.csv');return false">students.csv</a> &middot;
        <a href="#" onclick="downloadAuth('/api/admin/export/actions.csv','actions.csv');return false">actions.csv</a> &middot;
        <a href="#" onclick="downloadAuth('/api/admin/export/scoreboard.csv','scoreboard.csv');return false">scoreboard.csv</a> &middot;
        <a href="#" onclick="downloadAuth('/api/admin/export/approvals.csv','approvals.csv');return false">approvals.csv</a> &middot;
        <a href="#" onclick="downloadAuth('/api/admin/export/artifacts.csv','artifacts.csv');return false">artifacts.csv</a> &middot;
        <a href="#" onclick="downloadAuth('/api/admin/export/questions.csv','questions.csv');return false">questions.csv</a></div></div>
    <h2>Activity</h2>
    ${timeline.length? timeline.map(t=>`<div class="card ${railFor(t.status)}">
      <div class="row"><strong class="grow">Ch ${t.chapter_number}: ${esc(t.title)}</strong>${statusPill(t.status)}</div>
      ${t.done_note?`<div class="muted">Did: ${esc(t.done_note)}</div>`:''}
      ${t.parked_reason?`<div class="muted">Parked: ${esc(t.parked_reason)}</div>`:''}
    </div>`).join('') : '<p class="muted">No activity yet.</p>'}`;
  renderTabs();
}

// ---------- tabs + router ----------
function renderTabs(active){
  const t=document.getElementById('tabs');
  if(!ME || ME.role!=='student'){ t.innerHTML=''; return; }
  const tab=(h,l,k)=>`<a class="${active===k?'active':''}" href="${h}">${l}</a>`;
  t.innerHTML = `<div class="tabs" style="position:fixed">
    ${tab('#/','Home','home')}${tab('#/playbook','Playbook','playbook')}${tab('#/binder','Binder','binder')}${tab('#/score','Score','score')}
    <a href="#" onclick="logout();return false" style="flex:1;text-align:center;padding:10px;font-size:12px;color:var(--muted)">Log out</a></div>`;
}

async function ensureMe(){
  if(ME) return ME;
  if(!TOKEN) return null;
  try{ const d=await api('/api/me'); ME=d.user; return ME; }catch(_){ setToken(''); return null; }
}

async function route(){
  const hash = location.hash || '#/';
  const claim = hash.match(/^#\/claim\/(.+)$/);
  if(claim){ screenClaim(claim[1]); return; }
  const psetup = hash.match(/^#\/parent-setup\/(.+)$/);
  if(psetup){ screenParentSetup(psetup[1]); return; }
  if(hash==='#/login'){ screenLogin(); return; }
  if(hash==='#/privacy'){ screenPrivacy(); return; }

  const me = await ensureMe();
  if(!me){ screenLogin(); return; }

  try{
    if(me.role==='admin'){
      const sd = hash.match(/^#\/admin\/student\/(\d+)$/);
      const rv = hash.match(/^#\/review\/(\d+)$/);
      const it = hash.match(/^#\/inbox\/(\d+)$/);
      const rp = hash.match(/^#\/report\/(\d+)$/);
      if(hash==='#/review') return screenReviewQueue();
      if(rv) return screenReviewArtifact(rv[1]);
      if(hash==='#/inbox') return screenInbox();
      if(it) return screenInboxThread(it[1]);
      if(rp) return screenReport(rp[1]);
      if(sd) return screenAdminStudent(sd[1]);
      return screenAdmin();
    }
    if(me.role==='parent'){
      if(hash==='#/what-parent-sees') return screenWhatParentSees();
      if(hash==='#/approvals') return screenParentApprovals();
      if(hash==='#/add-teen') return screenAddTeen();
      const cd = hash.match(/^#\/child\/(\d+)\/doc\/(.+)$/);
      const cc = hash.match(/^#\/child\/(\d+)$/);
      if(cd) return screenParentDoc(cd[1],cd[2]);
      if(cc) return screenParentChild(cc[1]);
      return screenParentHome();
    }
    // student
    if(me.link_pending) return screenLinkPending();
    if(hash==='#/score') return screenScore();
    if(hash==='#/checkpoints') return screenCheckpoints();
    if(hash==='#/questions') return screenQuestions();
    if(hash==='#/what-parent-sees') return screenWhatParentSees();
    if(!me.has_onboarded && hash!=='#/onboarding'){ location.hash='#/onboarding'; return; }
    if(hash==='#/onboarding') return screenOnboarding();
    const ch = hash.match(/^#\/chapter\/(.+)$/);
    const stp = hash.match(/^#\/step\/(.+)$/);
    const av = hash.match(/^#\/artifact\/([^/]+)\/versions$/);
    const ar = hash.match(/^#\/artifact\/([^/]+)$/);
    if(av) return screenArtifactVersions(av[1]);
    if(ar) return screenArtifact(ar[1]);
    if(hash==='#/binder') return screenBinder();
    if(hash==='#/elena') return screenElena();
    if(ch) return screenChapter(ch[1]);
    if(stp) return screenStep(stp[1]);
    if(hash==='#/playbook') return screenPlaybook();
    return screenHome();
  }catch(e){
    app.innerHTML = '<div class="card"><p class="err">'+esc(e.message)+'</p><button onclick="location.reload()">Reload</button></div>';
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('load', async ()=>{ await renderBeta(); route(); });
</script>
<script src="/binder.js"></script>
<script src="/family.js"></script>
</body>
</html>
